<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IIT Ropar JoSAA counselling guide — cutoff ranks, branch change policy, campus life, FAQ, and more.">
    <title>IIT Ropar | Counselling Guide 2026</title>
    
    <!-- Google Fonts: Inter (Apple standard) & Cinzel (Hero display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="spiral-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none;"></canvas>
    <div class="dynamic-bg-glow"></div>

    <!-- ═══════════════════════════════════════════════════════
         NAVBAR
         ═══════════════════════════════════════════════════════ -->
    <nav class="navbar" id="navbar">
        <div class="logo">
            <img src="logo.png" alt="IIT Ropar Logo" class="nav-img-logo">
            <span class="logo-text">IIT Ropar <span class="highlight">Counselling</span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="#welcome-section">Home</a>
            <a href="#predictor-section">Trends</a>
            <a href="info.html">Info & FAQ</a>
            <a href="https://github.com/Thoihenba/iit-ropar-counselling" target="_blank" class="github-link"><i class='bx bxl-github'></i></a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <main>
        <!-- ═══════════════════════════════════════════════════
             1. HERO
             ═══════════════════════════════════════════════════ -->
        <section id="welcome-section" class="full-screen-section">
            <div class="hero">
                <span class="hero-prelude hero-fade hero-fade-1">WELCOME TO</span>
                <h1 class="monolithic-title text-gradient-gold hero-fade hero-fade-1">IIT ROPAR</h1>
                <p class="hero-subtitle hero-fade hero-fade-2">
                    <span class="typewriter" data-text="Discover your path to excellence."></span>
                </p>
                <a href="#predictor-section" class="scroll-down-btn hero-fade hero-fade-3">
                    <span>Explore</span>
                    <i class='bx bx-chevrons-down'></i>
                </a>
            </div>
        </section>

        <!-- ═══════════════════════════════════════════════════
             2. ABOUT
             ═══════════════════════════════════════════════════ -->
        <section id="about-section" class="content-section">
            <div class="section-inner">
                <div class="section-label animate-on-scroll">About</div>
                <h2 class="section-heading animate-on-scroll">IIT <span class="text-gradient-gold">Ropar</span></h2>
                <p class="section-description animate-on-scroll delay-1" id="about-description"></p>
                <div class="animate-on-scroll delay-2">
                    <a id="about-link" href="#" target="_blank" rel="noopener" class="btn-minimal">
                        Visit Official Website <i class='bx bx-right-arrow-alt'></i>
                    </a>
                </div>
            </div>
        </section>

        <!-- ═══════════════════════════════════════════════════
             3. RANK TRENDS
             ═══════════════════════════════════════════════════ -->
        <section id="predictor-section" class="content-section alt-bg">
            <div class="section-inner wide">
                <div class="section-label animate-on-scroll">Year-over-Year</div>
                <h2 class="section-heading animate-on-scroll">Rank <span class="text-gradient-emerald">Trends</span></h2>
                <p class="section-description animate-on-scroll delay-1">Track how IIT Ropar cutoffs have evolved over the last 3 years (2023–2025).</p>
                
                <div class="trends-grid animate-on-scroll delay-2" id="trends-grid">
                    <!-- Cards injected via JS -->
                </div>
            </div>
        </section>


    </main>

    <!-- ═══════════════════════════════════════════════════════
         FOOTER
         ═══════════════════════════════════════════════════════ -->
    <footer class="footer" id="site-footer">
        <!-- Injected via JS -->
    </footer>

    <script src="spiral-base64.js"></script>
    <script src="particle-physics.js"></script>
    <script src="site-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
